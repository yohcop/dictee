<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictee - Spelling Presentation</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        :root {
            --bg: #1a1a2e;
            --text: #eee;
            --input-bg: #16213e;
            --muted: #888;
            --hint: #666;
            --accent: #e94560;
            --btn-bg: #333;
            --btn-text: #aaa;
        }

        body.light {
            --bg: #f5f5f5;
            --text: #222;
            --input-bg: #fff;
            --muted: #666;
            --hint: #999;
            --accent: #e94560;
            --btn-bg: #ddd;
            --btn-text: #555;
        }

        h1 {
            margin-bottom: 20px;
            color: #fff;
        }

        /* Input Mode */
        #input-mode {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        #input-mode textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            font-size: 18px;
            border: 1px solid var(--muted);
            border-radius: 8px;
            resize: vertical;
            background: var(--input-bg);
            color: var(--text);
        }

        #input-mode textarea::placeholder {
            color: var(--hint);
        }

        #input-mode button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #input-mode button:hover {
            opacity: 0.85;
        }

        .hint {
            margin-top: 15px;
            color: var(--muted);
            font-size: 14px;
        }

        /* Presentation Mode */
        #presentation-mode {
            display: none;
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: var(--bg);
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #section-container {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            padding: 40vh 0;
        }

        #section-display {
            font-size: 48px;
            text-align: left;
            padding: 40px 5%;
            width: 100%;
            word-wrap: break-word;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        #section-display .section {
            color: var(--muted);
            white-space: pre-wrap;
            padding: 2px 6px;
            margin: 0 -2px;
            border-radius: 4px;
            display: inline;
        }

        #section-display .section.current {
            color: #fff;
            background: var(--accent);
        }

        #progress {
            position: fixed;
            bottom: 40px;
            font-size: 24px;
            color: var(--muted);
        }

        #nav-hint {
            position: fixed;
            bottom: 80px;
            font-size: 16px;
            color: var(--hint);
        }

        #back-btn, #theme-btn, .font-btn {
            position: fixed;
            top: 20px;
            padding: 10px 20px;
            font-size: 14px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #back-btn {
            left: 20px;
        }

        #theme-btn {
            right: 20px;
        }

        #font-controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
        }

        #font-controls .font-btn {
            position: static;
            padding: 10px 15px;
            font-size: 18px;
            font-weight: bold;
        }

        #back-btn:hover, #theme-btn:hover, .font-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <button id="theme-btn" onclick="toggleTheme()">Light Mode</button>

    <div id="input-mode">
        <h1>Dictee</h1>
        <textarea id="text-input" placeholder="Enter your text here, using | to separate sections...&#10;&#10;Example: The quick | brown fox | jumps over | the lazy dog"></textarea>
        <br>
        <button onclick="startPresentation()">Start Presentation</button>
        <p class="hint">Use the | character to separate text into sections</p>
    </div>

    <div id="presentation-mode">
        <button id="back-btn" onclick="exitPresentation()">Back to Edit</button>
        <div id="font-controls">
            <button class="font-btn" onclick="changeFontSize(-8)">-</button>
            <button class="font-btn" onclick="changeFontSize(8)">+</button>
        </div>
        <div id="section-container">
            <div id="section-display"></div>
        </div>
        <div id="nav-hint">Use arrow keys: Left/Right to navigate</div>
        <div id="progress"></div>
    </div>

    <script>
        let sections = [];
        let currentIndex = 0;
        let fontSize = 48;

        const textInput = document.getElementById('text-input');
        textInput.value = localStorage.getItem('dictee-text') || '';
        textInput.addEventListener('input', () => {
            localStorage.setItem('dictee-text', textInput.value);
        });

        function changeFontSize(delta) {
            fontSize = Math.max(16, Math.min(120, fontSize + delta));
            document.getElementById('section-display').style.fontSize = fontSize + 'px';
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.getElementById('theme-btn');
            btn.textContent = document.body.classList.contains('light') ? 'Dark Mode' : 'Light Mode';
        }

        function startPresentation() {
            const text = document.getElementById('text-input').value.trim();
            if (!text) {
                alert('Please enter some text first');
                return;
            }

            sections = text.split('|').map(s => s.replace(/^[ \t]+|[ \t]+$/g, '')).filter(s => s.length > 0);
            if (sections.length === 0) {
                alert('No valid sections found');
                return;
            }

            currentIndex = 0;
            document.getElementById('input-mode').style.display = 'none';
            document.getElementById('presentation-mode').style.display = 'flex';
            document.getElementById('font-controls').style.display = 'block';
            updateDisplay();
        }

        function exitPresentation() {
            document.getElementById('presentation-mode').style.display = 'none';
            document.getElementById('font-controls').style.display = 'none';
            document.getElementById('input-mode').style.display = 'block';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateDisplay() {
            const display = document.getElementById('section-display');
            let html = '';
            for (let i = 0; i <= currentIndex; i++) {
                const isCurrent = i === currentIndex;
                html += `<span class="section${isCurrent ? ' current' : ''}" ${isCurrent ? 'id="current-section"' : ''}>${escapeHtml(sections[i])}</span> `;
            }
            display.innerHTML = html;
            document.getElementById('progress').textContent = `${currentIndex + 1} / ${sections.length}`;

            const currentEl = document.getElementById('current-section');
            if (currentEl) {
                currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function navigate(direction) {
            if (direction === 'next' && currentIndex < sections.length - 1) {
                currentIndex++;
                updateDisplay();
            } else if (direction === 'prev' && currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('presentation-mode').style.display === 'flex') {
                if (e.key === 'ArrowRight' || e.key === ' ') {
                    navigate('next');
                } else if (e.key === 'ArrowLeft') {
                    navigate('prev');
                } else if (e.key === 'Escape') {
                    exitPresentation();
                }
            }
        });
    </script>
</body>
</html>
